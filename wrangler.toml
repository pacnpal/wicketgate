# ─────────────────────────────────────────────────────────────────────
# Wicketgate
# ─────────────────────────────────────────────────────────────────────
#
# 1. Create KV:   npx wrangler kv namespace create WICKETGATE_KV
#    Paste the ID below.
#
# 2. Secrets:
#    npx wrangler secret put ADMIN_SECRET
#    npx wrangler secret put CF_API_TOKEN      # optional, for discovery
#    npx wrangler secret put CF_ACCOUNT_ID     # optional, for discovery
#
# 3. Deploy:      npx wrangler deploy
#
# 4. Custom domain + Access policy on /admin* (see README)
#
# ─────────────────────────────────────────────────────────────────────

name = "wicketgate"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[[rules]]
type = "Text"
globs = ["**/*.html"]

# [[kv_namespaces]]
# binding = "WICKETGATE_KV"
